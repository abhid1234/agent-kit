<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
</style></head><body>
<div style="text-align: center; max-width: 600px; padding: 40px;">
  <h1 style="font-size: 32px; font-weight: 800; color: #0f172a; margin-bottom: 24px;">agent-kit</h1>
  <p style="font-size: 18px; color: #475569; margin-bottom: 32px;">Open-source TypeScript framework for<br>AI agents with persistent memory.</p>

  <div style="display: flex; flex-direction: column; gap: 12px; align-items: center;">
    <div style="background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 12px; padding: 14px 28px; width: 100%; max-width: 400px;">
      <div style="font-size: 12px; color: #64748b; margin-bottom: 4px;">Try it live — no install needed</div>
      <div style="font-size: 16px; font-weight: 700; color: #2563eb;">www.abhi-agent-kit.space</div>
    </div>
    <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px 28px; width: 100%; max-width: 400px;">
      <div style="font-size: 12px; color: #64748b; margin-bottom: 4px;">Install from npm</div>
      <div style="font-size: 14px; font-weight: 600; color: #0f172a; font-family: monospace;">npm install @avee1234/agent-kit</div>
    </div>
    <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px 28px; width: 100%; max-width: 400px;">
      <div style="font-size: 12px; color: #64748b; margin-bottom: 4px;">Source code</div>
      <div style="font-size: 14px; font-weight: 600; color: #0f172a;">github.com/abhid1234/agent-kit</div>
    </div>
  </div>

  <div style="margin-top: 32px; display: flex; justify-content: center; gap: 8px; align-items: center;">
    <div style="width: 20px; height: 20px; background: #4285f4; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: white; font-weight: 700;">G</div>
    <span style="font-size: 13px; color: #64748b;">Powered by <span style="color: #4285f4; font-weight: 600;">Gemini Flash</span> on <span style="color: #4285f4; font-weight: 600;">Google Cloud Run</span></span>
  </div>
</div>
